name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: FreeBSD
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 --branch ${{ github.ref_name }} ${{ github.server_url }}/${{ github.repository }}.git .

      - name: Install dependencies
        run: doas pkg install -y phpunit11-php84

      - name: Run tests
        run: phpunit

      - name: Build PHAR
        run: php -d phar.readonly=0 bin/build-phar.php

      - name: Create release
        run: |
          VERSION="${{ github.ref_name }}"
          BODY="Release ${VERSION} of Forgejo MCP Server.

          ## Install
          \`\`\`sh
          curl -LO ${{ github.server_url }}/${{ github.repository }}/releases/download/${VERSION}/forgejo-mcp.phar
          chmod +x forgejo-mcp.phar
          \`\`\`"

          # Create release via API
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${FORGE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\",\"body\":$(echo "$BODY" | jq -Rs .)}" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" | jq -r '.id')

          # Upload PHAR as release asset
          curl -s -X POST \
            -H "Authorization: token ${FORGE_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @forgejo-mcp.phar \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=forgejo-mcp.phar"

          echo "Release ${VERSION} created with PHAR attachment"
        env:
          FORGE_TOKEN: ${{ secrets.FORGE_TOKEN }}
